# CI cho bộ automation HRM (Playwright Python + pytest, POM + DDT)
# Test chạy trên demo công khai https://hrm.anhtester.com/erp -> CI không cần deploy app,
# chỉ cài Python + browser Chromium rồi chạy pytest headless.

stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  HEADLESS: "true"          # config/config.py đọc biến này -> chạy headless trên CI
  PYTHONUNBUFFERED: "1"

# Chỉ chạy 1 pipeline cho mỗi thay đổi: ưu tiên MR, tránh trùng pipeline branch khi đã có MR mở.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

playwright-tests:
  stage: test
  image: python:3.12-slim
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - playwright install --with-deps chromium    # cài Chromium + dependency hệ thống
  script:
    - mkdir -p reports
    - pytest --html=reports/report.html --self-contained-html
  artifacts:
    when: always                                 # giữ report cả khi test fail
    paths:
      - reports/report.html
      - reports/junit.xml
      - reports/screenshots/                      # ảnh chụp khi test fail (nếu có)
    reports:
      junit: reports/junit.xml                    # GitLab hiển thị kết quả test ngay trong MR
    expire_in: 1 week
