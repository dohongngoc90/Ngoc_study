[pytest]
# Make project packages (pages/, utils/, config/) importable without install
pythonpath = .

testpaths = tests

addopts =
    -v
    --tb=short
    --strict-markers
    --junitxml=reports/junit.xml
    -p no:playwright

markers =
    smoke: critical-path checks, run first / fast feedback
    regression: fuller coverage, run before release
    login: authentication module
    department: Core HR > Department module
    designation: Core HR > Designation module
    holiday: Core HR > Holidays module
    employee: Employees module
